name: Update App Data

on:
  # 每天北京时间凌晨 4 点（UTC 20:00）运行
  schedule:
    - cron: '0 20 * * *'
  # 也可以手动触发
  workflow_dispatch:

concurrency:
  group: update-app-data
  cancel-in-progress: false

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check upstream for changes
        id: check-upstream
        run: |
          # 获取上游最新 commit
          UPSTREAM_COMMIT=$(git ls-remote https://github.com/Anduin2017/HowToCook.git HEAD | cut -f1)
          echo "upstream_commit=$UPSTREAM_COMMIT" >> $GITHUB_OUTPUT

          # 从已发布版本读取上次同步的 commit，避免向代码仓库提交状态文件
          LAST_COMMIT=$(curl -fsSL https://howtocook.hunter-white.com/version.json 2>/dev/null \
            | sed -n 's/.*"upstreamCommit"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' \
            || true)

          # 比较是否有变化
          if [ "$UPSTREAM_COMMIT" = "$LAST_COMMIT" ]; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "No changes in upstream repository"
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "Upstream has new changes: $UPSTREAM_COMMIT"
          fi

      - name: Clone upstream HowToCook data
        if: steps.check-upstream.outputs.has_changes == 'true' || github.event_name == 'workflow_dispatch'
        run: |
          # 安装 Git LFS
          git lfs install
          # 克隆官方仓库（需要完整克隆以获取 LFS 文件）
          git clone --depth 1 https://github.com/Anduin2017/HowToCook.git upstream
          cd upstream
          # 拉取 LFS 文件
          git lfs pull
          cd ..
          # 复制数据目录到当前项目
          cp -r upstream/dishes ./
          cp -r upstream/tips ./
          rm -rf upstream

      - name: Setup Node.js
        if: steps.check-upstream.outputs.has_changes == 'true' || github.event_name == 'workflow_dispatch'
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: scripts/package-lock.json

      - name: Install dependencies
        if: steps.check-upstream.outputs.has_changes == 'true' || github.event_name == 'workflow_dispatch'
        working-directory: scripts
        run: npm ci

      - name: Parse markdown and generate data
        if: steps.check-upstream.outputs.has_changes == 'true' || github.event_name == 'workflow_dispatch'
        working-directory: scripts
        run: npm run build:data

      - name: Validate generated data
        if: steps.check-upstream.outputs.has_changes == 'true' || github.event_name == 'workflow_dispatch'
        run: |
          for file in recipes.json categories.json tips.json; do
            test -s "app/src/assets/data/$file"
            node -e "JSON.parse(require('fs').readFileSync('app/src/assets/data/$file', 'utf8'))"
          done

      - name: Collect images from dishes
        if: steps.check-upstream.outputs.has_changes == 'true' || github.event_name == 'workflow_dispatch'
        run: |
          mkdir -p images
          # 复制所有图片文件，保持目录结构
          find dishes -type f \( -iname "*.jpg" -o -iname "*.jpeg" -o -iname "*.png" -o -iname "*.gif" -o -iname "*.webp" \) | while read file; do
            rel_path="${file#dishes/}"
            dest_dir="images/$(dirname "$rel_path")"
            mkdir -p "$dest_dir"
            cp "$file" "$dest_dir/"
          done
          echo "Collected $(find images -type f | wc -l) images"

      - name: Upload data to Cloudflare R2
        if: steps.check-upstream.outputs.has_changes == 'true' || github.event_name == 'workflow_dispatch'
        uses: ryand56/r2-upload-action@b801a390acbdeb034c5e684ff5e1361c06639e7c # v1.4
        with:
          r2-account-id: ${{ secrets.R2_ACCOUNT_ID }}
          r2-access-key-id: ${{ secrets.R2_ACCESS_KEY_ID }}
          r2-secret-access-key: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          r2-bucket: ${{ secrets.R2_BUCKET_NAME }}
          source-dir: app/src/assets/data
          destination-dir: ./

      - name: Upload images to Cloudflare R2
        if: steps.check-upstream.outputs.has_changes == 'true' || github.event_name == 'workflow_dispatch'
        uses: ryand56/r2-upload-action@b801a390acbdeb034c5e684ff5e1361c06639e7c # v1.4
        with:
          r2-account-id: ${{ secrets.R2_ACCOUNT_ID }}
          r2-access-key-id: ${{ secrets.R2_ACCESS_KEY_ID }}
          r2-secret-access-key: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          r2-bucket: ${{ secrets.R2_BUCKET_NAME }}
          source-dir: images
          destination-dir: images

      # 版本文件是同步完成标记，必须在数据和图片全部上传成功后最后发布。
      - name: Generate completion version
        if: steps.check-upstream.outputs.has_changes == 'true' || github.event_name == 'workflow_dispatch'
        run: |
          mkdir -p version-upload
          VERSION=$(date +%Y%m%d%H%M%S)
          UPDATED_AT=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          UPSTREAM_COMMIT="${{ steps.check-upstream.outputs.upstream_commit }}"
          printf '{"version":"%s","updatedAt":"%s","upstreamCommit":"%s"}\n' \
            "$VERSION" "$UPDATED_AT" "$UPSTREAM_COMMIT" \
            > version-upload/version.json
          node -e "JSON.parse(require('fs').readFileSync('version-upload/version.json', 'utf8'))"

      - name: Publish completion version
        if: steps.check-upstream.outputs.has_changes == 'true' || github.event_name == 'workflow_dispatch'
        uses: ryand56/r2-upload-action@b801a390acbdeb034c5e684ff5e1361c06639e7c # v1.4
        with:
          r2-account-id: ${{ secrets.R2_ACCOUNT_ID }}
          r2-access-key-id: ${{ secrets.R2_ACCESS_KEY_ID }}
          r2-secret-access-key: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          r2-bucket: ${{ secrets.R2_BUCKET_NAME }}
          source-dir: version-upload
          destination-dir: ./

      - name: Summary
        run: |
          if [ "${{ steps.check-upstream.outputs.has_changes }}" = "true" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "✅ Data synced from upstream and uploaded to R2!"
            echo "Data files:"
            ls -la app/src/assets/data/
            echo "Version:"
            cat version-upload/version.json
            echo "Images: $(find images -type f | wc -l) files"
          else
            echo "ℹ️ No changes in upstream repository, skipped sync"
          fi
